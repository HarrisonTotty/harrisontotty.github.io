title: Harrison Totty
description: The personal website of Harrison Totty
baseurl: "/"
permalink: "/p/:title"
url: 'https://harrison.totty.dev'

plugins:
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      mathjax: true

exclude:
  - Gemfile
  - Gemfile.lock
  - justfile
  - README.md
  - LICENSE
  - .editorconfig
